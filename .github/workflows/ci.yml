name: CI - Server Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGO_URL: mongodb://127.0.0.1:27017/truck_expense_tracker_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install server dependencies
        run: |
          cd server
          npm ci --silent || npm install --no-audit --no-progress

      - name: Verify MongoDB connectivity
        run: |
          cd server
          node -e "const mongoose = require('mongoose'); mongoose.connect(process.env.MONGO_URL).then(() => mongoose.disconnect().then(() => console.log('MongoDB connection OK'))).catch(err => { console.error(err); process.exit(1); });"

      - name: Run server tests
        run: |
          cd server
          npm test --silent
